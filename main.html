<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .card { 
            border: 1px solid #00f2ff; 
            border-radius: 15px; 
            padding: 20px; 
            margin-bottom: 20px;
            box-shadow: 0 0 15px #00f2ff33;
        }
        h2 { color: #00f2ff; text-transform: uppercase; margin-top: 0; }
        .metodo { background: #111; padding: 8px; border-radius: 5px; margin: 5px 0; border-left: 3px solid #00f2ff; font-size: 14px; }
        .preco { font-size: 28px; color: #0f0; font-weight: bold; text-align: center; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🎟 VIP EZORDIUM</h2>
        <div class="preco">R$ 20,00</div>
        <p>✅ +5000 MÉTODOS ATUALIZADOS</p>
    </div>

    <div class="card">
        <h2>🔥 DESTAQUES</h2>
        <div class="metodo">💎 ESQUEMA BEBIDAS</div>
        <div class="metodo">💎 ESQUEMA DIMAS FF</div>
        <div class="metodo">💎 iFOOD NA CC</div>
    </div>
</body>
</html>
